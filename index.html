<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Radiologie Dr HOURI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0891b2;
            --bg-gradient: linear-gradient(135deg, #ecfeff 0%, #cffafe 100%);
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #1e293b;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
        .back-btn {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background: #64748b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .back-btn:hover { background: #475569; }
        .back-btn.visible { display: inline-flex; }
        .floating-back {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .floating-back:hover {
            background: linear-gradient(135deg, #0e7490 0%, #0891b2 100%);
            transform: scale(1.05);
        }
        .floating-back.visible { display: block; }
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn-radiologie {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-radiologie:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(8, 145, 178, 0.3);
        }
        .btn-radiologie i { margin-right: 12px; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            h1 { font-size: 1.3rem; }
            .floating-back {
                bottom: 10px;
                left: 10px;
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="#" id="floatingBack" class="floating-back" onclick="window.location.href = sessionStorage.getItem('sourceUrl'); return false;">
        <i class="fas fa-arrow-left"></i> Retour au site
    </a>
    
    <div class="container">
        <a href="#" id="backBtn" class="back-btn" onclick="window.location.href = sessionStorage.getItem('sourceUrl'); return false;">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
        <h1><i class="fas fa-x-ray"></i> Radiologie Dr HOURI</h1>
        <p class="subtitle">Sélectionnez un dossier</p>
        
        <div class="buttons-grid">
            <a href="radiologie/index.html" class="btn-radiologie">
                <i class="fas fa-folder"></i> Radiologie pulmonaire d'origine cardiaque
            </a>
            <a href="radiologie3/index.html" class="btn-radiologie">
                <i class="fas fa-folder"></i> Principes radio thorax
            </a>
            <a href="radiologie2/index.html" class="btn-radiologie">
                <i class="fas fa-folder"></i> Serie de radios thoraciques (+800) 
                Dr HOURI
            </a>
            
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sourceUrl = urlParams.get('from');
        if (sourceUrl) {
            sessionStorage.setItem('sourceUrl', sourceUrl);
        }
        if (sessionStorage.getItem('sourceUrl')) {
            document.getElementById('backBtn').classList.add('visible');
            document.getElementById('floatingBack').classList.add('visible');
        }
    </script>
</body>
</html>
